<!doctype html>
<html lang="en" style="--accent: #f0a848; --accent-soft: rgba(240, 168, 72, 0.16)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z Audio Compressor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header class="plugin-header">
        <div class="title-row">
          <h1>Compressor</h1>
          <p class="eyebrow">Z AUDIO EFFECT</p>
        </div>
        <div class="header-right">
          <span class="header-note">drag curve: threshold / ratio · wheel: knee</span>
          <span id="status">Waiting for host</span>
        </div>
      </header>

      <div class="viz" style="min-height: 128px">
        <canvas id="viz" title="Drag: threshold (←→) / ratio (↑↓) · wheel: knee"></canvas>
        <span class="viz-caption">Transfer curve</span>
      </div>

      <div class="panels cols-4">
        <section class="section" id="sec-comp">
          <h2 class="section-title">Compression</h2>
        </section>
        <section class="section" id="sec-detect">
          <h2 class="section-title">Detection</h2>
        </section>
        <section class="section" id="sec-time">
          <h2 class="section-title">Timing</h2>
        </section>
        <section class="section" id="sec-level">
          <h2 class="section-title">Level</h2>
        </section>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
