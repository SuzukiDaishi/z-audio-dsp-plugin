<!doctype html>
<html lang="en" style="--accent: #f06a58; --accent-soft: rgba(240, 106, 88, 0.16)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z Audio Limiter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header class="plugin-header">
        <div class="title-row">
          <h1>Limiter</h1>
          <p class="eyebrow">Z AUDIO EFFECT</p>
        </div>
        <div class="header-right">
          <span class="header-note">drag curve: threshold / ceiling</span>
          <span id="status">Waiting for host</span>
        </div>
      </header>

      <div class="viz" style="min-height: 120px">
        <canvas id="viz" title="Drag: threshold (←→) / ceiling (↑↓)"></canvas>
        <span class="viz-caption">Transfer curve</span>
      </div>

      <div class="panels cols-2">
        <section class="section" id="sec-gain">
          <h2 class="section-title">Gain Staging</h2>
        </section>
        <section class="section" id="sec-time">
          <h2 class="section-title">Behaviour</h2>
        </section>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
