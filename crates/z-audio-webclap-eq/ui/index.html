<!doctype html>
<html lang="en" style="--accent: #58b0e0; --accent-soft: rgba(88, 176, 224, 0.16)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z Audio EQ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="eq-main">
      <header class="plugin-header">
        <div class="title-row">
          <h1>EQ</h1>
          <p class="eyebrow">Z AUDIO · 8-BAND PARAMETRIC</p>
        </div>
        <div class="header-right">
          <label class="analyzer-toggle"><input type="checkbox" id="show-pre" checked />Pre</label>
          <label class="analyzer-toggle"><input type="checkbox" id="show-post" checked />Post</label>
          <span class="header-note">double-click: add band · drag: freq/gain · wheel: Q · dbl-click dot: remove</span>
          <span id="status">Waiting for host</span>
        </div>
      </header>

      <div class="viz eq-viz">
        <canvas id="viz"></canvas>
      </div>

      <div class="eq-bottom">
        <div class="band-chips" id="band-chips"></div>
        <div class="band-panel" id="band-panel"></div>
        <div class="eq-global">
          <span class="global-label">OUTPUT</span>
          <input type="range" id="output-gain" min="-24" max="24" step="0.1" value="0" />
          <output id="output-readout">0.0 dB</output>
        </div>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
