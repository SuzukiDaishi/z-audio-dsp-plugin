<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z Audio Simple EQ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header class="plugin-header">
        <div class="title-row">
          <h1>Simple EQ</h1>
          <p class="eyebrow">Z AUDIO EFFECT</p>
        </div>
        <span id="status">Waiting for host</span>
      </header>
      <section class="graph-panel" aria-label="EQ response">
        <svg viewBox="0 0 900 304" preserveAspectRatio="none" aria-hidden="true">
          <g id="grid"></g>
          <path id="low-fill" class="band-fill"></path>
          <path id="mid-fill" class="band-fill"></path>
          <path id="high-fill" class="band-fill"></path>
          <path id="low-line" class="band-line"></path>
          <path id="mid-line" class="band-line"></path>
          <path id="high-line" class="band-line"></path>
          <path id="composite-line"></path>
          <g id="nodes"></g>
        </svg>
      </section>
      <form id="controls" class="bands" autocomplete="off"></form>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
