<!doctype html>
<html lang="en" style="--accent: #4ac9e0; --accent-soft: rgba(74, 201, 224, 0.16)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z Audio Ring Mod</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header class="plugin-header">
        <div class="title-row">
          <h1>Ring Mod</h1>
          <p class="eyebrow">Z AUDIO EFFECT</p>
        </div>
        <div class="header-right">
          <span class="header-note">drag: frequency (←→) / mix (↑↓)</span>
          <span id="status">Waiting for host</span>
        </div>
      </header>

      <div class="viz" style="min-height: 120px">
        <canvas id="viz" title="Drag: carrier frequency (←→) / mix (↑↓)"></canvas>
        <span class="viz-caption">Carrier × input</span>
      </div>

      <div class="panels cols-2">
        <section class="section" id="sec-carrier">
          <h2 class="section-title">Carrier</h2>
        </section>
        <section class="section" id="sec-output">
          <h2 class="section-title">Output</h2>
        </section>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
