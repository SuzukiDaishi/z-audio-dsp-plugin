<!doctype html>
<html lang="en" style="--accent: #7ed05c; --accent-soft: rgba(126, 208, 92, 0.16)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z Audio Flanger</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header class="plugin-header">
        <div class="title-row">
          <h1>Flanger</h1>
          <p class="eyebrow">Z AUDIO EFFECT</p>
        </div>
        <div class="header-right">
          <span class="header-note">drag: manual (←→) / feedback (↑↓)</span>
          <span id="status">Waiting for host</span>
        </div>
      </header>

      <div class="viz" style="min-height: 120px">
        <canvas id="viz" title="Drag: manual delay (←→) / feedback (↑↓)"></canvas>
        <span class="viz-caption">Comb response at LFO center</span>
      </div>

      <div class="panels cols-2">
        <section class="section" id="sec-sweep">
          <h2 class="section-title">Sweep</h2>
        </section>
        <section class="section" id="sec-output">
          <h2 class="section-title">Output</h2>
        </section>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
