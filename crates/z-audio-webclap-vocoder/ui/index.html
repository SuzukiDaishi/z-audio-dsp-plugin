<!doctype html>
<html lang="en" style="--accent: #b58cff; --accent-soft: rgba(181, 140, 255, 0.16)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z Audio Vocoder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header class="plugin-header">
        <div class="title-row">
          <h1>Vocoder</h1>
          <p class="eyebrow">Z AUDIO EFFECT</p>
        </div>
        <div class="header-right">
          <span class="header-note">play the keyboard (or MIDI) to drive the carrier</span>
          <span id="status">Waiting for host</span>
        </div>
      </header>

      <div class="viz" style="height: 170px">
        <canvas id="viz" title="Modulator band envelopes"></canvas>
        <span class="viz-caption">Band envelopes</span>
      </div>

      <div class="panels cols-3">
        <section class="section" id="sec-carrier">
          <h2 class="section-title">Carrier</h2>
        </section>
        <section class="section" id="sec-vocoder">
          <h2 class="section-title">Vocoder</h2>
        </section>
        <section class="section" id="sec-output">
          <h2 class="section-title">Output</h2>
        </section>
      </div>

      <div class="keys-wrap">
        <div id="keyboard" class="keyboard" title="Click / drag to play carrier notes"></div>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
