<!doctype html>
<html lang="en" style="--accent: #f0a848; --accent-soft: rgba(240, 168, 72, 0.16)">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Z Audio Saturator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header class="plugin-header">
        <div class="title-row">
          <h1>Saturator</h1>
          <p class="eyebrow">Z AUDIO EFFECT</p>
        </div>
        <div class="header-right">
          <span class="header-note">drag curve: drive (↑↓) / warmth (←→)</span>
          <span id="status">Waiting for host</span>
        </div>
      </header>

      <div class="viz" style="min-height: 120px">
        <canvas id="viz" title="Drag: drive (↑↓) / warmth (←→)"></canvas>
        <span class="viz-caption">Saturation curve</span>
      </div>

      <div class="panels cols-2">
        <section class="section" id="sec-drive">
          <h2 class="section-title">Character</h2>
        </section>
        <section class="section" id="sec-output">
          <h2 class="section-title">Tone & Output</h2>
        </section>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
